<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-lg p-6 max-w-md w-full relative">
    
    <button class="absolute top-4 right-4 text-gray-500 hover:text-gray-800" (click)="close()">✕</button>

    <div class="flex flex-col text-left">
      <h2 class="text-xl font-bold mb-2 border-b border-gray-500 pb-4 break-words">{{ fund.name }}</h2>
      <p>Monto invertido: $ {{ fund.amount }}</p>
      <p>Categoría: {{ fund.type }}</p>
      <p>Monto mínimo: $ {{ fund.minAmount }}</p>

      <div *ngIf="errorMessage" class="mt-2 bg-red-100 text-red-700 text-sm p-2 rounded mb-3">
        {{ errorMessage }}
        </div>

      <button class="bg-[#5C6BC0] text-white px-6 py-2 rounded-lg hover:bg-[#3f51b5] transition mt-4" (click)="cancel(fund)"> Cancelar suscripción </button>
    </div>

  </div>
</div>
